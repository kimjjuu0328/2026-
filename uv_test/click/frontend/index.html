<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Click Counter Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="counter">
        <p class="label">Click Counter</p>
        <div id="count" class="count">0</div>
        <div class="actions" aria-label="counter controls">
            <button id="decrease" class="button secondary" type="button">-</button>
            <button id="increase" class="button primary" type="button">+</button>
        </div>
    </main>
    <script src="app.js"></script>
</body>

</html>
