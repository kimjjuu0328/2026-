<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Text Memo</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f5f7;
            color: #222;
        }

        .app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .buttons {
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 14px;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        button.secondary {
            background: #4b5563;
        }

        button:hover {
            opacity: 0.9;
        }

        textarea {
            flex: 1;
            width: 100%;
            resize: none;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            line-height: 1.6;
            outline: none;
            background: white;
        }

        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .status {
            min-height: 22px;
            font-size: 13px;
            color: #555;
        }

        .status.success {
            color: #15803d;
        }

        .status.error {
            color: #dc2626;
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <h1>메모장</h1>

            <div class="buttons">
                <button class="secondary" id="loadBtn">불러오기</button>
                <button id="saveBtn">저장</button>
            </div>
        </header>

        <textarea id="memo" placeholder="메모를 입력하세요..."></textarea>

        <div id="status" class="status"></div>
    </div>

    <script>
        const memo = document.getElementById("memo");
        const saveBtn = document.getElementById("saveBtn");
        const loadBtn = document.getElementById("loadBtn");
        const statusEl = document.getElementById("status");

        function setStatus(message, type = "") {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        async function saveNote() {
            try {
                const text = memo.value;

                const result = await window.pywebview.api.save_note(text);

                setStatus(`저장되었습니다: ${result.path}`, "success");
            } catch (error) {
                console.error(error);
                setStatus("저장 중 오류가 발생했습니다.", "error");
            }
        }

        async function loadNote() {
            try {
                const result = await window.pywebview.api.load_note();

                memo.value = result.text || "";
                setStatus("메모를 불러왔습니다.", "success");
            } catch (error) {
                console.error(error);
                setStatus("불러오기 중 오류가 발생했습니다. 아직 저장된 메모가 없을 수 있습니다.", "error");
            }
        }

        saveBtn.addEventListener("click", saveNote);
        loadBtn.addEventListener("click", loadNote);

        document.addEventListener("keydown", (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
                event.preventDefault();
                saveNote();
            }

            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "o") {
                event.preventDefault();
                loadNote();
            }
        });

        window.addEventListener("pywebviewready", () => {
            loadNote();
        });
    </script>
</body>

</html>
